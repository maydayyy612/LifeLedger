<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ffffff" />

<title>LifeLedger</title>

<style>
/* =========================
   BASE RESET
========================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
}

body {
  background: #f5f5f7;
  color: #111;
  height: 100vh;
  overflow: hidden;
}

/* =========================
   THEME
========================= */
:root {
  --bg: #f5f5f7;
  --card: rgba(255,255,255,0.7);
  --text: #111;
  --subtext: #666;
  --primary: #007aff;
  --income: #34c759;
  --expense: #ff3b30;
  --radius: 18px;
  --shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* =========================
   LAYOUT
========================= */
.app {
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* TOP AREA */
.top {
  padding: 50px 20px 20px;
}

/* DASHBOARD CARD */
.card {
  background: var(--card);
  backdrop-filter: blur(20px);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 15px;
}

/* BIG AMOUNT */
.big-number {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

/* SUB TEXT */
.sub {
  font-size: 13px;
  color: var(--subtext);
}

/* =========================
   BOTTOM NAV
========================= */
.nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 75px;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(20px);
  display: flex;
  justify-content: space-around;
  align-items: center;
  border-top: 1px solid rgba(0,0,0,0.05);
}

.nav-item {
  font-size: 12px;
  color: var(--subtext);
  text-align: center;
}

.nav-item.active {
  color: var(--primary);
  font-weight: 600;
}

/* FLOAT BUTTON */
.fab {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  font-size: 28px;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 10px 20px rgba(0,122,255,0.3);
}

/* =========================
   PAGE AREA
========================= */
.page {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  padding-bottom: 120px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="app">

  <!-- ================= DASHBOARD ================= -->
  <div id="page-home" class="page">

    <div class="top">

      <div class="card">
        <div class="sub">本月结余</div>
        <div class="big-number">￥0</div>
      </div>

      <div class="card">
        <div class="sub">收入</div>
        <div class="big-number" style="color:var(--income)">￥0</div>
      </div>

      <div class="card">
        <div class="sub">支出</div>
        <div class="big-number" style="color:var(--expense)">￥0</div>
      </div>

      <div class="card">
        <div class="sub">最近记录</div>
        <div style="margin-top:10px;color:#999;font-size:14px;">
          暂无记录
        </div>
      </div>

    </div>

  </div>

  <!-- ================= TIMELINE ================= -->
  <div id="page-timeline" class="page hidden">
    <div class="card">
      <div class="sub">时间轴</div>
      <div style="margin-top:10px;color:#999;">
        暂无数据
      </div>
    </div>
  </div>

  <!-- ================= STATS ================= -->
  <div id="page-stats" class="page hidden">
    <div class="card">
      <div class="sub">统计</div>
      <div style="margin-top:10px;color:#999;">
        暂无统计数据
      </div>
    </div>
  </div>

  <!-- ================= SETTINGS ================= -->
  <div id="page-settings" class="page hidden">
    <div class="card">
      <div class="sub">我的</div>
      <div style="margin-top:10px;">
        预算 / 分类 / 导入导出 / 深色模式（V1后续添加）
      </div>
    </div>
  </div>

  <!-- FLOAT BUTTON -->
 <div class="fab" onclick="openSheet()">+</div>

  <!-- BOTTOM NAV -->
  <div class="nav">
    <div class="nav-item active" onclick="switchPage('home', this)">首页</div>
    <div class="nav-item" onclick="switchPage('timeline', this)">时间轴</div>
    <div class="nav-item" onclick="switchPage('stats', this)">统计</div>
    <div class="nav-item" onclick="switchPage('settings', this)">我的</div>
  </div>

</div>


  <script>
    
let db;
let editId = null;

const categories = [
  "餐饮","饮品","交通","房租","购物","娱乐",
  "旅行","数码","工资","投资","礼物","宠物","学习","医疗","其他"
];

/* ========= 数据层 ========= */
const DataLayer = {

  add(record) {
    const tx = db.transaction(["records"], "readwrite");
    const store = tx.objectStore("records");
    store.add(record);
    tx.oncomplete = UI.refresh;
  },

  update(record) {
    const tx = db.transaction(["records"], "readwrite");
    const store = tx.objectStore("records");
    store.put(record);
    tx.oncomplete = UI.refresh;
  },

  delete(id) {
    const tx = db.transaction(["records"], "readwrite");
    const store = tx.objectStore("records");
    store.delete(id);
    tx.oncomplete = UI.refresh;
  },

  getAll(cb) {
    const tx = db.transaction(["records"], "readonly");
    const store = tx.objectStore("records");
    const req = store.getAll();
    req.onsuccess = () => cb(req.result);
  }
};

/* ========= 逻辑层 ========= */
const Logic = {

  calculate(data) {
    let income = 0;
    let expense = 0;
    let categoryMap = {};

    data.forEach(item => {
      if (item.type === "income") income += item.amount;
      else expense += item.amount;

      categoryMap[item.category] =
        (categoryMap[item.category] || 0) + item.amount;
    });

    return { income, expense, balance: income - expense, categoryMap };
  }
};

/* ========= UI层 ========= */
const UI = {

  refresh() {
    DataLayer.getAll(data => {
      UI.renderHome(data);
      UI.renderTimeline(data);
      UI.renderStats(data);
    });
  },

  renderHome(data) {
    const r = Logic.calculate(data);
    const cards = document.querySelectorAll(".big-number");

    cards[0].innerText = "￥" + r.balance;
    cards[1].innerText = "￥" + r.income;
    cards[2].innerText = "￥" + r.expense;
  },

  renderTimeline(data) {
    const page = document.getElementById("page-timeline");

    let html = `<div class="card"><div class="sub">时间轴</div>`;

    data.slice().reverse().forEach(item => {
      html += `
        <div style="margin-top:12px;padding:10px;background:#fafafa;border-radius:10px;">
          <div style="display:flex;justify-content:space-between;">

            <div>
              <div>${item.category}</div>
              <div style="font-size:12px;color:#999">${item.note || ""}</div>
            </div>

            <div style="text-align:right;">

              <div style="color:${item.type==='income'?'#34c759':'#ff3b30'}">
                ${item.type==='income' ? '+' : '-'}${item.amount}
              </div>

              <div style="margin-top:6px;">
                <button onclick='UI.edit(${JSON.stringify(item)})'>编辑</button>
                <button onclick='DataLayer.delete(${item.id})' style="color:red;">删除</button>
              </div>

            </div>

          </div>
        </div>
      `;
    });

    html += `</div>`;
    page.innerHTML = html;
  },

  renderStats(data) {
    const r = Logic.calculate(data);

    let html = `
      <div class="card">
        <div class="sub">统计</div>
        <div style="margin-top:10px;">
          收入：￥${r.income}<br>
          支出：￥${r.expense}<br>
          结余：￥${r.balance}
        </div>
      </div>

      <div class="card">
        <div class="sub">分类统计</div>
    `;

    for (let k in r.categoryMap) {
      html += `<div style="margin-top:8px;">${k}：￥${r.categoryMap[k]}</div>`;
    }

    html += `</div>`;

    document.getElementById("page-stats").innerHTML = html;
  },

  edit(item) {
    editId = item.id;

    document.getElementById("type").value = item.type;
    document.getElementById("amount").value = item.amount;
    document.getElementById("category").value = item.category;
    document.getElementById("note").value = item.note;

    openSheet("edit", item);
  }
};

/* ========= 保存 ========= */
function saveRecord() {

  const type = document.getElementById("type").value;
  const amount = parseFloat(document.getElementById("amount").value);
  const category = document.getElementById("category").value;
  const note = document.getElementById("note").value;

  if (!amount || isNaN(amount)) {
    alert("请输入正确金额");
    return;
  }

  const record = {
    id: editId,
    type,
    amount,
    category,
    note,
    date: new Date().toISOString()
  };

  if (editId) {
    DataLayer.update(record);
  } else {
    delete record.id;
    DataLayer.add(record);
  }

  closeSheet();
}

/* ========= sheet ========= */
function openSheet(mode = "add") {
  document.getElementById("sheet").style.bottom = "0px";

  if (mode === "add") {
    editId = null;
    document.getElementById("type").value = "expense";
    document.getElementById("amount").value = "";
    document.getElementById("category").value = "餐饮";
    document.getElementById("note").value = "";
  }
}

function closeSheet() {
  document.getElementById("sheet").style.bottom = "-600px";
}

/* ========= DB ========= */
function initDB() {
  const request = indexedDB.open("LifeLedgerDB", 1);

  request.onupgradeneeded = e => {
    db = e.target.result;
    if (!db.objectStoreNames.contains("records")) {
      db.createObjectStore("records", {
        keyPath: "id",
        autoIncrement: true
      });
    }
  };

  request.onsuccess = e => {
    db = e.target.result;
    UI.refresh();
  };
}

window.onload = initDB;

/* ========= 路由 ========= */
function switchPage(page, el) {

  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));

  document.getElementById('page-' + page).classList.remove('hidden');
  el.classList.add('active');
}
</script>
<div id="sheet" style="
position:fixed;
bottom:-600px;
left:0;
right:0;
background:#fff;
border-radius:20px 20px 0 0;
padding:20px;
transition:0.3s;
z-index:999;
">

<div style="text-align:center;font-weight:600;margin-bottom:10px;">
新增记录
</div>

<select id="type" style="width:100%;padding:10px;margin-bottom:10px;">
  <option value="expense">支出</option>
  <option value="income">收入</option>
</select>

<input id="amount" placeholder="金额" style="width:100%;padding:10px;margin-bottom:10px;" />

<select id="category" style="width:100%;padding:10px;margin-bottom:10px;">
  <option>餐饮</option>
  <option>交通</option>
  <option>购物</option>
  <option>娱乐</option>
  <option>工资</option>
</select>

<input id="note" placeholder="备注" style="width:100%;padding:10px;margin-bottom:10px;" />

<button onclick="saveRecord()" style="
width:100%;
padding:12px;
background:#007aff;
color:#fff;
border:none;
border-radius:12px;
">
保存
</button>

</div>
</body>
</html>
