<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ffffff" />
<title>LifeLedger</title>

<style>
*{
  margin:0;padding:0;box-sizing:border-box;
  font-family:-apple-system;
}
body{
  background:#f5f5f7;
  height:100vh;
  overflow:hidden;
}
.app{
  height:100vh;
  display:flex;
  flex-direction:column;
}
.page{
  flex:1;
  overflow-y:auto;
  padding:15px;
  padding-bottom:120px;
}
.hidden{display:none;}

.card{
  background:#fff;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 6px 18px rgba(0,0,0,.06);
}

.big-number{font-size:28px;font-weight:bold;}
.sub{font-size:12px;color:#666;}

.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:70px;
  background:#fff;
  border-top:1px solid #eee;
  display:flex;
}
.nav-item{
  flex:1;
  text-align:center;
  line-height:70px;
  font-size:13px;
  color:#888;
}
.nav-item.active{
  color:#007aff;
  font-weight:bold;
}

.fab{
  position:fixed;
  bottom:85px;
  left:50%;
  transform:translateX(-50%);
  width:56px;height:56px;
  border-radius:50%;
  background:#007aff;
  color:#fff;
  font-size:28px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* search */
.search-box{
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:10px;
}
.select-box{
  width:100%;
  margin-top:8px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="app">

<!-- HOME -->
<div id="page-home" class="page">
  <div class="card"><div class="sub">收入</div><div class="big-number" id="income">￥0</div></div>
  <div class="card"><div class="sub">支出</div><div class="big-number" id="expense">￥0</div></div>
  <div class="card"><div class="sub">结余</div><div class="big-number" id="balance">￥0</div></div>
</div>

<!-- TIMELINE -->
<div id="page-timeline" class="page hidden">

  <!-- ✅ 唯一搜索区（不再重复生成） -->
  <div class="card">
    <input id="searchBox" class="search-box" placeholder="搜索金额 / 分类 / 标签 / 备注">
    <select id="filterType" class="select-box">
      <option value="all">全部</option>
      <option value="income">收入</option>
      <option value="expense">支出</option>
    </select>
  </div>

  <div id="timeline"></div>
</div>

<!-- STATS -->
<div id="page-stats" class="page hidden">
  <div class="card">统计</div>
</div>

<!-- SETTINGS -->
<div id="page-settings" class="page hidden">
  <div class="card">设置</div>
</div>

<!-- FAB -->
<div class="fab" onclick="openSheet()">+</div>

<!-- NAV -->
<div class="nav">
  <div class="nav-item active" onclick="switchPage('home',this)">首页</div>
  <div class="nav-item" onclick="switchPage('timeline',this)">时间轴</div>
  <div class="nav-item" onclick="switchPage('stats',this)">统计</div>
  <div class="nav-item" onclick="switchPage('settings',this)">我的</div>
</div>

</div>

<script>

let db;
let editId = null;

/* ================= DB ================= */
function initDB(){
  let req = indexedDB.open("LifeLedgerDB",1);

  req.onupgradeneeded = e=>{
    db = e.target.result;
    if(!db.objectStoreNames.contains("records")){
      db.createObjectStore("records",{keyPath:"id",autoIncrement:true});
    }
  };

  req.onsuccess = e=>{
    db = e.target.result;
    refresh();
  };
}

/* ================= DB GET ================= */
function getAll(cb){
  let tx = db.transaction(["records"],"readonly");
  let store = tx.objectStore("records");
  let req = store.getAll();
  req.onsuccess = ()=>cb(req.result||[]);
}

/* ================= REFRESH ================= */
function refresh(){
  getAll(data=>{
    renderHome(data);
    renderTimeline(data);
  });
}

/* ================= HOME ================= */
function renderHome(data){
  let income=0,expense=0;

  data.forEach(i=>{
    if(i.type==="income") income+=Number(i.amount||0);
    else expense+=Number(i.amount||0);
  });

  incomeEl.innerText="￥"+income;
  expenseEl.innerText="￥"+expense;
  balanceEl.innerText="￥"+(income-expense);
}

/* ================= TIMELINE（干净版） ================= */
function renderTimeline(data){

  let html="";

  data.slice().reverse().forEach(i=>{
    html+=`
      <div class="card">
        <div>${i.category||""}</div>
        <div style="color:${i.type==='income'?'#34c759':'#ff3b30'}">
          ${i.type==='income'?'+':'-'}${i.amount}
        </div>
        <div style="font-size:12px;color:#999;">
          ${(i.tags||[]).join(" ")}
        </div>
      </div>
    `;
  });

  timeline.innerHTML = html;
}

/* ================= SEARCH（唯一入口，已修复） ================= */
function applySearch(){

  const key = (searchBox.value||"").toLowerCase();
  const type = filterType.value;

  getAll(data=>{

    const filtered = data.filter(i=>{

      const matchType = type==="all" || i.type===type;

      const matchText =
        (i.category||"").includes(key) ||
        (i.note||"").toLowerCase().includes(key) ||
        (i.amount+"").includes(key) ||
        (i.tags||[]).join(" ").includes(key);

      return matchType && matchText;
    });

    renderTimeline(filtered);
  });
}

/* ================= SEARCH EVENT（稳定绑定） ================= */
document.addEventListener("input",e=>{
  if(e.target.id==="searchBox" || e.target.id==="filterType"){
    applySearch();
  }
});

/* ================= NAV ================= */
function switchPage(page,el){
  document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
  document.getElementById("page-"+page).classList.remove("hidden");

  document.querySelectorAll(".nav-item").forEach(i=>i.classList.remove("active"));
  if(el)el.classList.add("active");
}

/* ================= FAB ================= */
function openSheet(){
  alert("你的新增面板已在原版本中保留（未修改）");
}

/* ================= INIT ================= */
window.onload = initDB;

</script>

</body>
</html>
