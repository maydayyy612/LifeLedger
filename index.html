<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>LifeLedger V6</title>

<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<style>
body{margin:0;font-family:-apple-system;background:#f5f5f7;}
.page{display:none;padding:12px;}
.page.active{display:block;}

.nav{
  position:fixed;bottom:0;left:0;right:0;height:60px;
  display:flex;background:#fff;border-top:1px solid #eee;
}
.nav div{flex:1;text-align:center;line-height:60px;}

.card{
  background:#fff;padding:12px;border-radius:12px;margin-bottom:10px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">
  <div class="card">📊 LifeLedger 增强版</div>
</div>

<!-- TIMELINE（保留你的原功能挂载点） -->
<div id="timeline" class="page"></div>

<!-- CALENDAR -->
<div id="calendar" class="page">
  <div class="card">📅 日历视图</div>
  <div id="calendarBox"></div>
</div>

<!-- CHART -->
<div id="chart" class="page">
  <div class="card">📈 数据图表</div>
  <div id="pie" style="height:300px;"></div>
  <div id="bar" style="height:300px;"></div>
  <div id="line" style="height:300px;"></div>
</div>

<!-- BUDGET -->
<div id="budget" class="page">
  <div class="card">
    <div>💰 月预算</div>
    <input id="budgetInput" placeholder="输入预算" style="width:100%;padding:8px;">
    <button onclick="saveBudget()">保存</button>
    <div id="budgetInfo"></div>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="show('home')">首页</div>
  <div onclick="show('timeline')">记录</div>
  <div onclick="show('calendar')">日历</div>
  <div onclick="show('chart')">图表</div>
  <div onclick="show('budget')">预算</div>
</div>

<script>

/* =========================
   你的数据源（完全不动结构）
========================= */
let db;

/* =========================
   初始化 DB（不改你的）
========================= */
function init(){
  let req=indexedDB.open("LifeLedgerDB",1);
  req.onsuccess=e=>{
    db=e.target.result;
    loadAll();
  }
}

/* =========================
   获取数据
========================= */
function getAll(cb){
  let tx=db.transaction(["records"],"readonly");
  let store=tx.objectStore("records");
  let req=store.getAll();
  req.onsuccess=()=>cb(req.result||[]);
}

/* =========================
   页面切换（不影响你原系统）
========================= */
function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* =========================
   数据加载总入口
========================= */
function loadAll(){
  getAll(data=>{
    renderCalendar(data);
    renderCharts(data);
    renderBudget(data);
  });
}

/* =========================
   📅 日历模块（新增）
========================= */
function renderCalendar(data){
  let box=document.getElementById("calendarBox");
  let map={};

  data.forEach(i=>{
    map[i.date]=(map[i.date]||0)+(i.type==="expense"?-i.amount:i.amount);
  });

  box.innerHTML=Object.keys(map).map(d=>
    `<div class="card">${d}：${map[d]}</div>`
  ).join("");
}

/* =========================
   📈 图表模块（新增 ECharts）
========================= */
function renderCharts(data){

  let cat={};
  let trend={};

  data.forEach(i=>{
    cat[i.category]=(cat[i.category]||0)+i.amount;
    trend[i.date]=(trend[i.date]||0)+(i.type==="expense"?-i.amount:i.amount);
  });

  echarts.init(document.getElementById("pie")).setOption({
    series:[{type:"pie",data:Object.keys(cat).map(k=>({name:k,value:cat[k]}))}]
  });

  echarts.init(document.getElementById("bar")).setOption({
    xAxis:{type:"category",data:Object.keys(cat)},
    yAxis:{type:"value"},
    series:[{type:"bar",data:Object.values(cat)}]
  });

  echarts.init(document.getElementById("line")).setOption({
    xAxis:{type:"category",data:Object.keys(trend)},
    yAxis:{type:"value"},
    series:[{type:"line",data:Object.values(trend)}]
  });
}

/* =========================
   💰 预算系统（新增）
========================= */
function renderBudget(data){

  let budget=localStorage.getItem("budget")||0;

  let expense=0;
  data.forEach(i=>{
    if(i.type==="expense") expense+=i.amount;
  });

  document.getElementById("budgetInfo").innerHTML=
    `已花：${expense} / 预算：${budget} / 剩余：${budget-expense}`;
}

function saveBudget(){
  let v=document.getElementById("budgetInput").value;
  localStorage.setItem("budget",v);
  loadAll();
}

/* =========================
   INIT
========================= */
window.onload=init;

</script>
</body>
</html>
