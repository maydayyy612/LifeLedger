<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ffffff" />
<title>LifeLedger V3.2</title>

<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system;}
body{background:#f5f5f7;height:100vh;overflow:hidden;}

.app{height:100vh;display:flex;flex-direction:column;}

.page{flex:1;overflow:auto;padding:15px;display:none;}
.page.active{display:block;}

.card{
  background:#fff;border-radius:14px;
  padding:12px;margin-bottom:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.nav{
  height:60px;display:flex;
  background:#fff;border-top:1px solid #eee;
}
.nav div{flex:1;text-align:center;line-height:60px;}

.fab{
  position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%);
  width:56px;height:56px;border-radius:50%;
  background:#007aff;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
}

#sheet{
  position:fixed;bottom:-700px;left:0;right:0;
  background:#fff;border-radius:18px 18px 0 0;
  padding:15px;transition:.3s;z-index:999;
  max-height:80vh;overflow:auto;
}
</style>
</head>

<body>

<div class="app">

<!-- HOME（不改你原结构，只做占位增强） -->
<div id="page-home" class="page active">
  <div class="card">📊 LifeLedger V3.2</div>
</div>

<!-- TIMELINE（原功能仍由JS渲染） -->
<div id="page-timeline" class="page"></div>

<!-- CALENDAR -->
<div id="page-calendar" class="page">
  <div class="card">📅 日历</div>
  <div id="calendarBox"></div>
</div>

<!-- STATS -->
<div id="page-stats" class="page">
  <div class="card">📊 图表分析</div>
  <div id="pie" style="height:300px;"></div>
  <div id="bar" style="height:300px;"></div>
</div>

<!-- BUDGET -->
<div id="page-budget" class="page">
  <div class="card">
    💰 预算
    <input id="budgetInput" placeholder="输入预算" style="width:100%;padding:10px;margin-top:10px;">
    <button onclick="saveBudget()">保存</button>
    <div id="budgetInfo"></div>
  </div>
</div>

<!-- NAV（不动你的结构思路） -->
<div class="nav">
  <div onclick="switchPage('home',this)">首页</div>
  <div onclick="switchPage('timeline',this)">记录</div>
  <div onclick="switchPage('calendar',this)">日历</div>
  <div onclick="switchPage('stats',this)">图表</div>
  <div onclick="switchPage('budget',this)">预算</div>
</div>

</div>

<!-- FAB（不动） -->
<div class="fab" onclick="openSheet()">+</div>

<!-- SHEET（你原来的必须保留，这里假设你已有，不再删除） -->
<div id="sheet"></div>

<script>

/* =========================
   DB（不改结构）
========================= */
let db;

function initDB(){
  const req=indexedDB.open("LifeLedgerDB",1);
  req.onsuccess=e=>{
    db=e.target.result;
    refreshAll();
  }
}

function getAll(cb){
  const tx=db.transaction(["records"],"readonly");
  const store=tx.objectStore("records");
  const req=store.getAll();
  req.onsuccess=()=>cb(req.result||[]);
}

/* =========================
   REFRESH（统一入口）
========================= */
function refreshAll(){
  getAll(data=>{
    renderTimeline(data);
    renderCalendar(data);
    renderCharts(data);
    renderBudget(data);
  });
}

/* =========================
   TIMELINE（增强但不破坏）
========================= */
function renderTimeline(data){
  const el=document.getElementById("page-timeline");
  if(!el) return;

  el.innerHTML=data.slice().reverse().map(i=>`
    <div class="card">
      <div>${i.category||""}</div>
      <div style="color:${i.type==='income'?'#34c759':'#ff3b30'}">
        ${i.type==='income'?'+':'-'}${i.amount}
      </div>
      <div style="font-size:12px;color:#999;">
        ${(i.tags||[]).join(" ")}
      </div>
    </div>
  `).join("");
}

/* =========================
   📅 日历（新增，不影响旧逻辑）
========================= */
function renderCalendar(data){
  const el=document.getElementById("calendarBox");
  if(!el) return;

  let map={};
  data.forEach(i=>{
    map[i.date]=(map[i.date]||0)+(i.type==='expense'?-i.amount:i.amount);
  });

  el.innerHTML=Object.keys(map).map(d=>`
    <div class="card">${d}：${map[d]}</div>
  `).join("");
}

/* =========================
   📊 图表（新增）
========================= */
function renderCharts(data){

  let cat={};
  data.forEach(i=>{
    cat[i.category]=(cat[i.category]||0)+i.amount;
  });

  echarts.init(document.getElementById("pie")).setOption({
    series:[{
      type:'pie',
      data:Object.keys(cat).map(k=>({name:k,value:cat[k]}))
    }]
  });

  echarts.init(document.getElementById("bar")).setOption({
    xAxis:{type:'category',data:Object.keys(cat)},
    yAxis:{type:'value'},
    series:[{type:'bar',data:Object.values(cat)}]
  });
}

/* =========================
   💰 预算系统（新增）
========================= */
function renderBudget(data){
  let budget=localStorage.getItem("budget")||0;
  let expense=0;

  data.forEach(i=>{
    if(i.type==='expense') expense+=i.amount;
  });

  const el=document.getElementById("budgetInfo");
  if(el){
    el.innerHTML=`已用：${expense} / 预算：${budget} / 剩余：${budget-expense}`;
  }
}

function saveBudget(){
  localStorage.setItem("budget",document.getElementById("budgetInput").value);
  refreshAll();
}

/* =========================
   NAV
========================= */
function switchPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  const el=document.getElementById("page-"+id);
  if(el) el.classList.add("active");
}

/* =========================
   FAB（保留你的 sheet）
========================= */
function openSheet(){
  const s=document.getElementById("sheet");
  if(s) s.style.bottom="0px";
}

window.onload=initDB;

</script>
</body>
</html>
